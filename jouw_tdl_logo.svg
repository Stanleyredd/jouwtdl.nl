<svg width="100%" viewBox="0 0 680 480" role="img" xmlns="http://www.w3.org/2000/svg">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Clarity System brand identity</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Three logo variations: primary horizontal logo with arc mark and wordmark, dark app icon, and monochrome version on light ground.</desc>

  <!-- PRIMARY LOGO -->
  <rect x="40" y="40" width="600" height="195" rx="14" fill="#F7F6F4" style="fill:rgb(247, 246, 244);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- C arc: center (268,137), r=42, gap ±40° facing right -->
  <!-- start (300.2, 110.0), end (300.2, 164.0), CCW large arc -->
  <path d="M 300.2 110.0 A 42 42 0 1 0 300.2 164.0" fill="none" stroke="#7B9E8D" stroke-width="2.5" stroke-linecap="round" style="fill:none;stroke:rgb(123, 158, 141);color:rgb(255, 255, 255);stroke-width:2.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Focus ring -->
  <circle cx="268" cy="137" r="10" fill="none" stroke="#7B9E8D" stroke-width="0.9" style="fill:none;stroke:rgb(123, 158, 141);color:rgb(255, 255, 255);stroke-width:0.9px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Center dot -->
  <circle cx="268" cy="137" r="3.5" fill="#3B5C50" style="fill:rgb(59, 92, 80);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Thin vertical divider -->
  <line x1="330" y1="102" x2="330" y2="172" stroke="#D4D1CB" stroke-width="0.5" style="fill:rgb(0, 0, 0);stroke:rgb(212, 209, 203);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Wordmark -->
  <text x="347" y="132" font-family="var(--font-sans)" font-size="28" font-weight="500" fill="#1A1A1A" letter-spacing="0.3" style="fill:rgb(26, 26, 26);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:28px;font-weight:500;text-anchor:start;dominant-baseline:auto">Jouw</text>
  <text x="350" y="158" font-family="var(--font-sans)" font-size="12" font-weight="400" fill="#7B9E8D" letter-spacing="4.5" style="fill:rgb(123, 158, 141);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">TDL</text>

  <!-- Primary label -->
  <text x="340" y="254" font-family="var(--font-sans)" font-size="11" fill="#BBBBBB" text-anchor="middle" style="fill:rgb(187, 187, 187);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Primary logo</text>

  <!-- ─── APP ICON ─── -->
  <rect x="152" y="278" width="144" height="144" rx="33" fill="#1A1A1A" style="fill:rgb(26, 26, 26);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- C arc: center (224, 350), r=31 -->
  <!-- start: (224+31×0.766, 350−31×0.643)=(247.75, 330.07) end:(247.75, 369.93) -->
  <path d="M 247.75 330.07 A 31 31 0 1 0 247.75 369.93" fill="none" stroke="rgba(255,255,255,0.84)" stroke-width="2" stroke-linecap="round" style="fill:none;stroke:rgba(255, 255, 255, 0.84);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="224" cy="350" r="7.5" fill="none" stroke="rgba(255,255,255,0.84)" stroke-width="0.8" style="fill:none;stroke:rgba(255, 255, 255, 0.84);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="224" cy="350" r="2.8" fill="rgba(255,255,255,0.84)" style="fill:rgba(255, 255, 255, 0.84);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="224" y="440" font-family="var(--font-sans)" font-size="11" fill="#BBBBBB" text-anchor="middle" style="fill:rgb(187, 187, 187);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">App icon</text>

  <!-- ─── MONOCHROME ─── -->
  <rect x="384" y="278" width="144" height="144" rx="14" fill="#F7F6F4" style="fill:rgb(247, 246, 244);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- C arc: center (456, 350), r=31 -->
  <!-- start: (456+23.75, 350−19.93)=(479.75, 330.07) end:(479.75, 369.93) -->
  <path d="M 479.75 330.07 A 31 31 0 1 0 479.75 369.93" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" style="fill:none;stroke:rgb(26, 26, 26);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="456" cy="350" r="7.5" fill="none" stroke="#1A1A1A" stroke-width="0.8" style="fill:none;stroke:rgb(26, 26, 26);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="456" cy="350" r="2.8" fill="#1A1A1A" style="fill:rgb(26, 26, 26);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Mini wordmark inside mono card -->
  <text x="456" y="397" font-family="var(--font-sans)" font-size="8.5" font-weight="500" fill="#1A1A1A" text-anchor="middle" letter-spacing="2.2" style="fill:rgb(26, 26, 26);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:8.5px;font-weight:500;text-anchor:middle;dominant-baseline:auto">JOUW TDL</text>
  <text x="456" y="440" font-family="var(--font-sans)" font-size="11" fill="#BBBBBB" text-anchor="middle" style="fill:rgb(187, 187, 187);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Monochrome</text>

</svg>