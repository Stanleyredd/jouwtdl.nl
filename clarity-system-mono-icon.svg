<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Clarity System monochrome icon</title>
  <desc>Light off-white square icon with black C arc mark and focus ring, no wordmark.</desc>

  <!-- Background -->
  <rect width="1024" height="1024" rx="120" fill="#F7F6F4"/>

  <!-- C arc: center (512, 512), r=310, gap ±40° facing right -->
  <path d="M 749.46 312.67 A 310 310 0 1 0 749.46 711.33"
        fill="none" stroke="#1A1A1A" stroke-width="22" stroke-linecap="round"/>

  <!-- Focus ring -->
  <circle cx="512" cy="512" r="75" fill="none" stroke="#1A1A1A" stroke-width="8"/>

  <!-- Center dot -->
  <circle cx="512" cy="512" r="28" fill="#1A1A1A"/>

</svg>
